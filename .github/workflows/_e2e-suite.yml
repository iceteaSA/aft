name: E2E Suite

# Reusable workflow that runs the full E2E test matrix:
#   - Linux Docker e2e   — OpenCode + plugin + binary stack against aimock
#   - macOS native e2e   — same stack on a real macOS-arm64 runner
#   - Windows native e2e — same stack on a real Windows runner (no containers)
#
# Called from:
#   - tests.yml (PR + main push) — catches regressions at PR time
#   - release.yml (tag push)     — gates build/publish on e2e success
#
# Single source of truth so PR-time and release-time e2e never drift.
#
# IMPORTANT: any change to bridge transport, bash spawning, ONNX install,
# locking, or platform-conditional code paths SHOULD touch the matching
# integration test or e2e scenario here. The Linux harness has caught real
# regressions before; the Windows e2e covers issue-#26-class Windows-specific
# bugs (bash timeouts, lock recovery, path separators); the macOS e2e covers
# FSEvents watcher behavior, /var vs /private/var symlink canonicalization,
# .dylib loading paths for ONNX, and Apple Silicon native codegen for aft.

on:
  workflow_call:
    inputs:
      cargo_profile:
        description: "Cargo profile for the aft binaries under test: 'release' (fat LTO, tag releases) or 'stage' (optimized, no LTO — minutes less link time; PR/push)"
        type: string
        default: release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # cargo puts `stage`-profile output under target/stage/, `release` under
  # target/release/. Every path below derives from this pair.
  CARGO_PROFILE: ${{ inputs.cargo_profile }}
  CARGO_PROFILE_DIR: ${{ inputs.cargo_profile == 'stage' && 'stage' || 'release' }}

jobs:
  # ---------------------------------------------------------------------------
  # Linux Docker e2e — exercises the full OpenCode + plugin + binary stack
  # against a deterministic aimock LLM.
  # ---------------------------------------------------------------------------
  e2e-linux:
    name: E2E (Linux Docker)
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # The E2E Dockerfile copies `packages/opencode-plugin/dist/` into the
      # image, so we have to produce that on the runner first. The plugin
      # depends on aft-bridge being built (workspace dependency).
      - name: Install workspace deps + build plugin
        run: |
          bun install --frozen-lockfile
          bun run --cwd packages/aft-bridge build
          bun run --cwd packages/opencode-plugin build

      - name: Build Linux x64 binary in Docker
        run: |
          docker build --platform linux/amd64 \
            --build-arg CARGO_PROFILE="$CARGO_PROFILE" \
            -t aft-build-linux \
            -f tests/docker/Dockerfile.build-linux .

      - name: Extract built binary
        run: |
          CID=$(docker create --platform linux/amd64 aft-build-linux true)
          docker cp "$CID:/build/target/$CARGO_PROFILE_DIR/aft" tests/docker/fixtures/aft-linux-x64
          docker rm "$CID"

      # The E2E Dockerfile installs the local package artifacts (npm pack
      # tarballs) instead of the published @latest plugin, so the image
      # exercises the code under test (real package.json + dist + deps), not
      # a published/local hybrid. Produce the tarballs on the runner first.
      - name: Pack local plugin artifacts
        run: |
          mkdir -p tests/docker/fixtures/npm-packs
          npm pack ./packages/aft-bridge --pack-destination tests/docker/fixtures/npm-packs
          npm pack ./packages/opencode-plugin --pack-destination tests/docker/fixtures/npm-packs

      - name: Build E2E test image
        run: |
          docker build --platform linux/amd64 \
            -t aft-e2e-linux-x64 \
            -f tests/docker/Dockerfile.linux-x64 .

      - name: Run E2E test
        run: docker run --rm --platform linux/amd64 aft-e2e-linux-x64

  # ---------------------------------------------------------------------------
  # Pi RPC e2e — exercises the real Pi runtime + AFT Pi plugin via RPC against
  # aimock. Runs on Linux only for now; failures are blocking.
  # ---------------------------------------------------------------------------
  pi-rpc-e2e:
    name: E2E (Pi RPC)
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v5
        with:
          node-version: "24"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install workspace deps
        run: bun install --frozen-lockfile

      - name: Build AFT binary (Linux native)
        run: cargo build --profile "$CARGO_PROFILE" -p agent-file-tools

      - name: Build aft-bridge dist
        run: bun run --cwd packages/aft-bridge build

      - name: Build Pi plugin dist
        run: bun run --cwd packages/pi-plugin build

      - name: Run Pi RPC E2E suite
        run: bun test
        working-directory: tests/pi-rpc
        env:
          AFT_BINARY_PATH: ${{ github.workspace }}/target/${{ inputs.cargo_profile == 'stage' && 'stage' || 'release' }}/aft

  # ---------------------------------------------------------------------------
  # Windows native e2e — exercises the same OpenCode + plugin + binary stack
  # on a real Windows runner. No containers. This is the only job that catches
  # Windows-specific bugs at the integration level (bash spawning + timeout
  # behavior — issue #26, ONNX install via tar.exe, file URI handling, lock
  # recovery). Windows containers require a Windows Docker host and add no
  # value over running natively on `windows-2022`.
  # ---------------------------------------------------------------------------
  e2e-windows:
    name: E2E (Windows native)
    runs-on: windows-2022
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build AFT binary (Windows x64)
        run: cargo build --profile $env:CARGO_PROFILE --target x86_64-pc-windows-msvc -p agent-file-tools
        shell: pwsh

      - name: Install workspace deps + build aft-bridge
        run: |
          bun install --frozen-lockfile
          bun run --cwd packages/aft-bridge build
        shell: pwsh

      - name: Build OpenCode plugin dist
        run: bun run --cwd packages/opencode-plugin build
        shell: pwsh

      - name: Run Windows E2E suite
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File tests/windows-e2e/run.ps1
        shell: pwsh
        env:
          AFT_BINARY_PATH: ${{ github.workspace }}\target\x86_64-pc-windows-msvc\${{ inputs.cargo_profile == 'stage' && 'stage' || 'release' }}\aft.exe
          AFT_PLUGIN_DIST: ${{ github.workspace }}\packages\opencode-plugin\dist

  # ---------------------------------------------------------------------------
  # macOS native e2e — exercises the same OpenCode + plugin + binary stack on
  # a real macOS-arm64 runner. No containers (GH Actions macOS runners can't
  # run Docker reliably). Uses the same shared bash harness as Linux Docker
  # via tests/macos-e2e/run.sh, which sets up host deps natively and then
  # invokes tests/docker/test-e2e.sh with AFT_E2E_PLATFORM=macos.
  #
  # Catches: FSEvents watcher behavior, /var vs /private/var canonicalization,
  # broken-symlink-chain fallback, .dylib loading, and Apple Silicon codegen.
  # ---------------------------------------------------------------------------
  e2e-macos:
    name: E2E (macOS native)
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      # cache-bin: false makes rust-cache safe on macOS: the old failure was
      # the cached ~/.cargo/bin shim overwriting the fresh cargo shim (which
      # then misread argv as rustup-init). Excluding bin keeps the dependency
      # artifacts without touching shims. See _unit-suite.yml unit-macos.
      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          cache-on-failure: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build AFT binary (macOS native)
        run: cargo build --profile "$CARGO_PROFILE" -p agent-file-tools

      # Ad-hoc sign + exec once: an unsigned fresh binary gets SIGKILLed on
      # newer macOS, and the first exec pays a syspolicyd assessment that can
      # take 30-90s under load — pay it here, not inside a harness timeout.
      - name: Sign and warm the binary
        run: |
          codesign -f -s - "target/$CARGO_PROFILE_DIR/aft" 2>/dev/null || true
          "target/$CARGO_PROFILE_DIR/aft" --version

      - name: Install workspace deps + build aft-bridge
        run: |
          bun install --frozen-lockfile
          bun run --cwd packages/aft-bridge build

      - name: Build OpenCode plugin dist
        run: bun run --cwd packages/opencode-plugin build

      - name: Run macOS E2E suite
        run: bash tests/macos-e2e/run.sh
        env:
          AFT_BINARY_PATH: ${{ github.workspace }}/target/${{ inputs.cargo_profile == 'stage' && 'stage' || 'release' }}/aft
          AFT_PLUGIN_DIST: ${{ github.workspace }}/packages/opencode-plugin/dist
