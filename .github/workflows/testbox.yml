name: Blacksmith Testbox

on:
  workflow_dispatch:
    inputs:
      testbox_id:
        description: "Testbox session identifier supplied by the Blacksmith CLI"
        required: true
        type: string
      ref:
        description: "Git ref to hydrate; defaults to the dispatched ref"
        required: false
        type: string

permissions:
  contents: read

# This workflow is intentionally separate from the merge/release gates. The
# Blacksmith Testbox CLI dispatches it to hydrate a warm runner, then runs
# flake-hunt commands against that runner while the final step idles.
jobs:
  warmup:
    name: Warm Rust testbox
    runs-on: blacksmith-4vcpu-ubuntu-2204
    timeout-minutes: 360
    steps:
      - name: Begin testbox session
        uses: useblacksmith/begin-testbox@v2
        with:
          testbox_id: ${{ inputs.testbox_id }}

      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build output
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-testbox-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-cargo-testbox-

      - uses: taiki-e/install-action@nextest

      - name: Prime Rust test binaries
        run: cargo nextest run --no-run -p agent-file-tools

      - name: Run testbox commands
        uses: useblacksmith/run-testbox@v2
        if: always()
